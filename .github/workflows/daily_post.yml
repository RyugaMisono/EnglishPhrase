name: 毎日自動投稿

on:
  schedule:
    - cron: "30 23 * * *"   # 毎日 08:30 JST (UTC+9 = UTC 23:30)
  workflow_dispatch:         # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: .env を作成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          printf "ANTHROPIC_API_KEY=%s\n"    "$ANTHROPIC_API_KEY"    >> .env
          printf "IMGBB_API_KEY=%s\n"        "$IMGBB_API_KEY"        >> .env
          printf "BUFFER_ACCESS_TOKEN=%s\n"  "$BUFFER_ACCESS_TOKEN"  >> .env
          printf "X_API_KEY=%s\n"            "$X_API_KEY"            >> .env
          printf "X_API_SECRET=%s\n"         "$X_API_SECRET"         >> .env
          printf "X_ACCESS_TOKEN=%s\n"       "$X_ACCESS_TOKEN"       >> .env
          printf "X_ACCESS_SECRET=%s\n"      "$X_ACCESS_SECRET"      >> .env

      - name: .env 確認（デバッグ）
        run: |
          echo "=== .env keys (値は非表示) ==="
          cut -d= -f1 .env
          echo "=== ANTHROPIC_API_KEY 長さ ==="
          awk -F= '/ANTHROPIC_API_KEY/{print length($2)}' .env

      - name: 未生成フレーズがあれば生成
        run: python main.py --count 3

      - name: 投稿実行
        run: python poster.py --buffer

      - name: 生成ファイルをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/generated.json output/cards/ phrase.txt
          git diff --staged --quiet || git commit -m "auto: 投稿 $(date '+%Y-%m-%d')"
          git push
